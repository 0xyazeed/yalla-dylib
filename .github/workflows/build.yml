name: Build dylib

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build dylib
      run: |
        SDK=$(xcrun --sdk iphoneos --show-sdk-path)
        clang -arch arm64 \
          -isysroot $SDK \
          -shared \
          -framework UIKit \
          -framework Foundation \
          -o AnimationBooster.dylib \
          AnimationBooster.m SpeedOverlay.m

    - name: Upload dylib
      uses: actions/upload-artifact@v4
      with:
        name: AnimationBooster
        path: AnimationBooster.dylib
