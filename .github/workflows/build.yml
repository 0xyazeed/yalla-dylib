name: Build dylib

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Build dylib
      run: |
        clang -shared -fPIC -o AnimationBooster.dylib AnimationBooster.m

    - name: Upload dylib
      uses: actions/upload-artifact@v4
      with:
        name: AnimationBooster
        path: AnimationBooster.dylib
